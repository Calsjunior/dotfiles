kitty_mod ctrl+shift

# =============================================================================
# FONTS
# =============================================================================
font_family JetBrainsMono Nerd Font
font_size 14

# =============================================================================
# APPEARANCE
# =============================================================================
cursor_shape block
cursor_trail 3
cursor_trail_decay 0.1 0.4
shell_integration no-cursor

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template " {index}: {title[title.rfind('/')+1:]} "

# Scrolling
touch_scroll_multiplier 8
map alt+u scroll_page_up
map alt+d scroll_page_down
map alt+shift+k scroll_line_up
map alt+shift+j scroll_line_down

# Window padding
window_padding_width 0 5

# =============================================================================
# LAYOUTS
# =============================================================================
enabled_layouts splits,stack

# =============================================================================
# WINDOW & SESSION BEHAVIOR
# =============================================================================
allow_remote_control yes
remember_window_size yes
initial_window_width 1000
initial_window_height 650
close_on_child_death no
confirm_os_window_close 0

# =============================================================================
# WINDOW BORDERS
# =============================================================================
active_border_color #7a7a7a
inactive_border_color #504945
window_border_width 1pt
draw_minimal_borders yes

# =============================================================================
# KEY MAPPINGS
# =============================================================================

# Misc
map ctrl+enter send_text all \x1b[13;5u
map ctrl+?     no_op

# Windows
map alt+enter new_window_with_cwd
map alt+q     close_window
map alt+r     start_resizing_window
map alt+h     neighboring_window left
map alt+l     neighboring_window right
map alt+k     neighboring_window up
map alt+j     neighboring_window down

# Tabs
map kitty_mod+t new_tab_with_cwd
map kitty_mod+l next_tab
map kitty_mod+h previous_tab
map kitty_mod+, move_tab_backward
map kitty_mod+. move_tab_forward

# Layouts
map kitty_mod+z toggle_layout stack

map kitty_mod+s show_scrollback

# =============================================================================
# THEME
# =============================================================================
# BEGIN_KITTY_THEME
# Gruvbox Material Dark Medium
include current-theme.conf
# END_KITTY_THEME
