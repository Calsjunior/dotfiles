[bar.default]
capsule = true
capsule_padding = 10.0
center = [ "workspaces" ]
end = [ "tray", "notifications", "clipboard", "volume", "brightness", "battery", "group:g1", "session", "control-center" ]
start = [ "launcher", "clock" ]

    [[bar.default.capsule_group]]
    fill = "surface_variant"
    id = "g1"
    members = [ "network", "bluetooth" ]
    opacity = 1.0
    padding = 10.0

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 900

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660

[shell]
font_family = "Noto Sans"
settings_show_advanced = true
telemetry_enabled = false

[theme]
builtin = "Gruvbox"
source = "builtin"

    [theme.templates]
    builtin_ids = [ "hyprland" ]

[widget.network]
show_label = false
